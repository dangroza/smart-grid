<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Grid — 50K Rows × 50 Columns</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f3f5f6;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #e7ebed;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .toolbar h1 {
      font-size: 16px;
      font-weight: 600;
      color: #1e293b;
    }
    .toolbar .stats {
      font-size: 13px;
      color: #7e929f;
    }

    .layout {
      flex: 1;
      display: flex;
      gap: 16px;
      padding: 16px;
      min-height: 0;
    }

    .grid-shell {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #grid-container {
      flex: 0 0 auto;
      width: 100%;
      background: #ffffff;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #e7ebed;
      box-shadow: none;
      min-width: 0;
    }

    /* Sidepanel (example-only UI) */
    #sidepanel {
      width: 340px;
      background: #ffffff;
      border: 1px solid #e7ebed;
      border-radius: 4px;
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .sg-sidepanel__header {
      padding: 12px 12px 10px;
      border-bottom: 1px solid #eef2f4;
      background: #fbfcfd;
    }

    .sg-sidepanel__title {
      font-size: 13px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: 0.2px;
    }

    .sg-sidepanel__summary {
      margin-top: 4px;
      font-size: 12px;
      color: #64748b;
    }

    .sg-sidepanel__content {
      padding: 12px;
      overflow: auto;
    }

    .sg-sidepanel__section {
      padding: 10px;
      border: 1px solid #eef2f4;
      border-radius: 6px;
      background: #ffffff;
    }

    .sg-sidepanel__section + .sg-sidepanel__section {
      margin-top: 12px;
    }

    .sg-sidepanel__section-title {
      font-size: 12px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 10px;
    }

    .sg-sidepanel__row {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    .sg-sidepanel__label {
      font-size: 12px;
      color: #334155;
      font-weight: 600;
    }

    .sg-sidepanel__hint {
      font-size: 11px;
      color: #64748b;
    }

    .sg-sidepanel__input,
    .sg-sidepanel__select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
      outline: none;
      font-size: 13px;
    }

    .sg-sidepanel__toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .sg-sidepanel__btn {
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
      background: #ffffff;
      color: #0f172a;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .sg-sidepanel__btn--primary {
      border-color: #2563eb;
      background: #2563eb;
      color: #ffffff;
    }

    .sg-sidepanel__btn:hover {
      filter: brightness(0.98);
    }

    .sg-sidepanel__columns {
      display: grid;
      gap: 6px;
    }

    .sg-sidepanel__checkrow {
      display: grid;
      grid-template-columns: 16px 1fr;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid #eef2f4;
      border-radius: 6px;
      cursor: pointer;
    }

    .sg-sidepanel__checklabel {
      font-size: 12px;
      color: #0f172a;
      font-weight: 600;
    }

    .sg-sidepanel__checkmeta {
      grid-column: 2;
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    @media (max-width: 980px) {
      #sidepanel {
        display: none;
      }
    }

    #footer-host {
      margin: 0;
    }

    .sg-pagination-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 42px;
      padding: 6px 10px;
      border: 1px solid #e7ebed;
      border-radius: 0;
      background: #efefef;
      color: #303030;
      font-size: 13px;
    }

    .sg-pagination-footer__left,
    .sg-pagination-footer__center,
    .sg-pagination-footer__right {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .sg-pagination-footer__left,
    .sg-pagination-footer__right {
      flex: 1;
    }

    .sg-pagination-footer__center {
      justify-content: center;
      white-space: nowrap;
    }

    .sg-pagination-footer__right {
      justify-content: flex-end;
      gap: 8px;
    }

    .sg-pagination-footer__label,
    .sg-pagination-footer__items {
      font-size: 13px;
      line-height: 1;
      color: #2f2f2f;
    }

    .sg-pagination-footer__select,
    .sg-pagination-footer__page-input {
      height: 34px;
      border: 1px solid #6f91a8;
      border-radius: 4px;
      background: #f6f6f6;
      color: #2f2f2f;
      padding: 0 10px;
      font-size: 13px;
      line-height: 1;
      min-width: 86px;
    }

    .sg-pagination-footer__page-input {
      width: 52px;
      text-align: center;
      min-width: 52px;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .sg-pagination-footer__page-input::-webkit-outer-spin-button,
    .sg-pagination-footer__page-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .sg-pagination-footer__link-btn {
      border: none;
      background: transparent;
      color: #7a7a7a;
      font-size: 13px;
      line-height: 1;
      padding: 0;
      cursor: pointer;
    }

    .sg-pagination-footer__link-btn:disabled {
      color: #b3b3b3;
      cursor: default;
    }

    .sg-pagination-footer--detached {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 999;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.15);
    }

    .benchmark-bar {
      padding: 10px 16px;
      border-bottom: 1px solid #e7ebed;
      background: #fafbfd;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .benchmark-bar input,
    .benchmark-bar button {
      height: 30px;
      font-size: 12px;
      border: 1px solid #d8e0e5;
      border-radius: 4px;
      background: #fff;
      padding: 0 8px;
    }

    .benchmark-bar button {
      cursor: pointer;
    }

    .benchmark-table {
      width: 100%;
      margin-top: 6px;
      border-collapse: collapse;
      font-size: 12px;
    }

    .benchmark-table th,
    .benchmark-table td {
      border-top: 1px solid #edf2f5;
      padding: 5px 6px;
      text-align: left;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>Smart Grid Demo</h1>
    <span class="stats" id="stats">Loading...</span>
  </div>
  <div class="benchmark-bar" id="benchmark-bar">
    <button id="bench-sort" type="button">Benchmark sort</button>
    <input id="bench-filter-input" type="text" value="alice" aria-label="Benchmark filter text" />
    <button id="bench-filter" type="button">Benchmark filter</button>
    <button id="bench-clear" type="button">Benchmark clear filter</button>
    <button id="bench-run-all" type="button">Run all</button>
    <table class="benchmark-table" aria-label="Benchmark summary">
      <thead>
        <tr>
          <th>Scenario</th>
          <th>Runs</th>
          <th>Last (ms)</th>
          <th>Median (ms)</th>
          <th>P95 (ms)</th>
        </tr>
      </thead>
      <tbody id="bench-results-body"></tbody>
    </table>
  </div>
  <div class="layout">
    <div class="grid-shell">
      <div id="grid-container"></div>
      <div id="footer-host"></div>
    </div>
    <aside id="sidepanel" aria-label="Grid configuration"></aside>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
