<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Grid — 50K Rows × 50 Columns</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f3f5f6;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #e7ebed;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .toolbar h1 {
      font-size: 16px;
      font-weight: 600;
      color: #1e293b;
    }
    .toolbar .stats {
      font-size: 13px;
      color: #7e929f;
    }

    .layout {
      flex: 1;
      display: flex;
      gap: 16px;
      padding: 16px;
      min-height: 0;
    }

    #grid-container {
      flex: 1;
      background: #ffffff;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #e7ebed;
      box-shadow: none;
      min-width: 0;
    }

    /* Sidepanel (example-only UI) */
    #sidepanel {
      width: 340px;
      background: #ffffff;
      border: 1px solid #e7ebed;
      border-radius: 4px;
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .sg-sidepanel__header {
      padding: 12px 12px 10px;
      border-bottom: 1px solid #eef2f4;
      background: #fbfcfd;
    }

    .sg-sidepanel__title {
      font-size: 13px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: 0.2px;
    }

    .sg-sidepanel__summary {
      margin-top: 4px;
      font-size: 12px;
      color: #64748b;
    }

    .sg-sidepanel__content {
      padding: 12px;
      overflow: auto;
    }

    .sg-sidepanel__section {
      padding: 10px;
      border: 1px solid #eef2f4;
      border-radius: 6px;
      background: #ffffff;
    }

    .sg-sidepanel__section + .sg-sidepanel__section {
      margin-top: 12px;
    }

    .sg-sidepanel__section-title {
      font-size: 12px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 10px;
    }

    .sg-sidepanel__row {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    .sg-sidepanel__label {
      font-size: 12px;
      color: #334155;
      font-weight: 600;
    }

    .sg-sidepanel__hint {
      font-size: 11px;
      color: #64748b;
    }

    .sg-sidepanel__input,
    .sg-sidepanel__select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
      outline: none;
      font-size: 13px;
    }

    .sg-sidepanel__toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .sg-sidepanel__btn {
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
      background: #ffffff;
      color: #0f172a;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .sg-sidepanel__btn--primary {
      border-color: #2563eb;
      background: #2563eb;
      color: #ffffff;
    }

    .sg-sidepanel__btn:hover {
      filter: brightness(0.98);
    }

    .sg-sidepanel__columns {
      display: grid;
      gap: 6px;
    }

    .sg-sidepanel__checkrow {
      display: grid;
      grid-template-columns: 16px 1fr;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid #eef2f4;
      border-radius: 6px;
      cursor: pointer;
    }

    .sg-sidepanel__checklabel {
      font-size: 12px;
      color: #0f172a;
      font-weight: 600;
    }

    .sg-sidepanel__checkmeta {
      grid-column: 2;
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    @media (max-width: 980px) {
      #sidepanel {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>Smart Grid Demo</h1>
    <span class="stats" id="stats">Loading...</span>
  </div>
  <div class="layout">
    <div id="grid-container"></div>
    <aside id="sidepanel" aria-label="Grid configuration"></aside>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
